[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rendernum"
version = "0.1.0"
description = "Finite-resolution arithmetic for dyadic intervals N_R."
readme = "README.md"
requires-python = ">=3.9"
authors = [{ name = "Render Universe contributors" }]
license = { text = "MIT" }
classifiers = [
  "Programming Language :: Python :: 3",
  "Topic :: Scientific/Engineering :: Mathematics",
]

[tool.setuptools.packages.find]
where = ["src"]

